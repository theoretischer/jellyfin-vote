services:
  jellyfin-vote:
    build:
      context: .
      network: host
    container_name: jellyfin-vote
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      # Set this to your Jellyfin server URL!
      - JELLYFIN_URL=http://YOUR_JELLYFIN_IP:8096
      # Website name (customize freely)
      - SITE_NAME=Jellyfin Vote
      - PORT=3000
